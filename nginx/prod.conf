## Version 2019/08/01 - Changelog: https://github.com/linuxserver/docker-letsencrypt/commits/master/root/defaults/default
# Cache zone
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=7d use_temp_path=off;

# redirect all traffic to https
server {
	listen 80 default_server;
	listen [::]:80 default_server;
	server_name _;
	return 301 https://$host$request_uri;
}

# main server block
server {
	listen 443 ssl http2 default_server;
	listen [::]:443 ssl http2 default_server;

    root /var/www/gameonpaper.com/html;
    index index.html index.htm index.nginx-debian.html;

    server_name gameonpaper.com  www.gameonpaper.com;

	# all ssl related config moved to ssl.conf
	include /config/nginx/ssl.conf;
    resolver 1.1.1.1 [::1]:5353 valid=30s;
    include mime.types;

    if ($http_user_agent ~* "(AdsBot-Google|Amazonbot|anthropic-ai|Applebot|Applebot-Extended|AwarioRssBot|AwarioSmartBot|Bytespider|CCBot|ChatGPT-User|ClaudeBot|Claude-Web|cohere-ai|DataForSeoBot|Diffbot|FacebookBot|FriendlyCrawler|Google-Extended|GoogleOther|GPTBot|img2dataset|ImagesiftBot|magpie-crawler|Meltwater|omgili|omgilibot|peer39_crawler|peer39_crawler/1.0|PerplexityBot|PiplBot|scoop.it|Seekr|YouBot)"){
        return 429;
    }

    set $cdn_domain "archive.gameonpaper.com";

    # # svg, fonts
    location ~* ^/assets/(.*)\.(svgz?|ttf|ttc|otf|eot|woff2?)$ {
        proxy_pass https://$cdn_domain/assets/$1.$2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $cdn_domain;
        proxy_set_header Origin $cdn_domain;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;

        add_header Access-Control-Allow-Origin "*";
        expires 7d;
        access_log off;
        break;
    }

    location ~* ^/assets/(.*)$ {
        proxy_pass https://$cdn_domain/assets/$1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $cdn_domain;
        proxy_set_header Origin $cdn_domain;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;

        expires 7d;
        access_log off;
        break;
    }

